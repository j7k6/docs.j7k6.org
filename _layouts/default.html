<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>{% if page.title %}{{page.title}}{% else %}{{site.name}}{% endif %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% capture styles %}
      {% include main.scss %}
    {% endcapture %}
    <style>{{ styles | scssify }}</style>
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="/feed.xml" >
  </head>

  <body>
    <div class="wrapper">
      <header>
        {% if page.url == '/' %}
        <h1><a href="/">{{site.name}}</a></h1>
        <p><input type="text" name="q" placeholder="?" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus></p>
        {% else %}
        <h2><a href="/">{{site.name}}</a></h2>
        {% endif %}
      </header>

      <div class="content">
        {{ content }}
      </div>

      <footer>
        <ul>
          <li>2013–{{ 'now' | date: "%Y" }}</li><!--
          --><li><a href="/feed.xml">RSS</a></li><!--
          --><li><a href="https://github.com/j7k6">Github</a></li><!--
          --><li><a href="bitcoin:bc1qrljfddytn5snjxe7j5zsv7u27504r2wyrxxv2p">Donate</a></li>
        </ul>
      </footer>
    </div>

    <script type="application/javascript">
      {% include main.js %}
    </script>
  </body>
</html>
